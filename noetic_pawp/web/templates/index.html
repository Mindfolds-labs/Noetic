<!doctype html>
<html>
<head><meta charset="utf-8"><title>Noetic TF.js Demo</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script></head>
<body>
<h1>Noetic TF.js Demo</h1>
<button onclick="runInference()">Run inference</button>
<pre id="out"></pre>
<script>
let model;
async function loadModel(){ model = await tf.loadGraphModel('./model/model.json'); }
async function runInference(){
  if(!model){ await loadModel(); }
  const x = tf.zeros([1,224,224,3]);
  const y = model.predict ? model.predict(x) : model.execute(x);
  document.getElementById('out').textContent = JSON.stringify(await y.array());
}
</script>
</body>
</html>
